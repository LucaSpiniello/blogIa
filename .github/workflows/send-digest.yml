name: Send 5AI Digest

on:
  schedule:
    - cron: "30 22 * * *" # 22:30 UTC, about 19:30 in Chile when UTC-3
  workflow_dispatch:
    inputs:
      date:
        description: "Optional date in YYYY-MM-DD"
        required: false
        type: string
      sandbox:
        description: "Send using Brevo sandbox mode"
        required: false
        default: true
        type: boolean

jobs:
  send_digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull latest published content
        run: git pull --rebase origin master || true

      - name: Send digest via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          SITE_URL: ${{ secrets.SITE_URL }}
          BREVO_EMAIL_LANG: ${{ secrets.BREVO_EMAIL_LANG }}
          BREVO_SANDBOX: ${{ github.event_name == 'workflow_dispatch' && (inputs.sandbox && '1' || '0') || secrets.BREVO_SANDBOX }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python scripts/brevo_digest.py --date "${{ inputs.date }}"
          else
            python scripts/brevo_digest.py
          fi
