name: Daily AI News Pipeline

on:
  schedule:
    # 3 corridas diarias (UTC) — ajustar según tu zona horaria
    - cron: "0 7 * * *"   # 7 AM UTC  — mañana
    - cron: "0 13 * * *"  # 1 PM UTC  — mediodía
    - cron: "0 20 * * *"  # 8 PM UTC  — noche
  workflow_dispatch: # Trigger manual desde GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull latest (may have previous run today)
        run: git pull --rebase origin main || true

      - name: Run scraping + synthesis pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scripts
        run: python run_pipeline.py

      - name: Commit and push updated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ content/raw/
          git diff --cached --quiet || (git commit -m "Update AI news for $(date +%Y-%m-%d) [run $(date +%H:%M)]" && git push)
