name: Daily AI News Pipeline

on:
  schedule:
    # 2 corridas diarias (UTC) — Argentina es UTC-3
    - cron: "0 12 * * *"  # 9 AM Argentina — mañana
    - cron: "0 22 * * *"  # 7 PM Argentina — noche
  workflow_dispatch: # Trigger manual desde GitHub

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull latest (may have previous run today)
        run: git pull --rebase origin master || true

      - name: Run scraping + synthesis pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scripts
        run: python run_pipeline.py

      - name: Commit and push updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A content/news/ content/raw/ content/subscribers.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update AI news for $(date +%Y-%m-%d) [run $(date +%H:%M)]"
          git push

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  send_digest:
    needs: publish
    if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30 minutes after the second fetch completes
        run: sleep 1800

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull latest published content
        run: git pull --rebase origin master || true

      - name: Send digest via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          SITE_URL: ${{ secrets.SITE_URL }}
          BREVO_EMAIL_LANG: ${{ secrets.BREVO_EMAIL_LANG }}
          BREVO_SANDBOX: ${{ secrets.BREVO_SANDBOX }}
        run: python scripts/brevo_digest.py
