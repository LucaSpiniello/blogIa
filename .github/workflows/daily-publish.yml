name: Daily AI News Pipeline

on:
  schedule:
    # 2 corridas diarias (UTC) — Argentina es UTC-3
    - cron: "0 12 * * *"  # 9 AM Argentina — mañana
    - cron: "0 22 * * *"  # 7 PM Argentina — noche
  workflow_dispatch: # Trigger manual desde GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull latest (may have previous run today)
        run: git pull --rebase origin master || true

      - name: Run scraping + synthesis pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scripts
        run: python run_pipeline.py

      - name: Commit and push updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/news/ content/raw/
          git diff --cached --quiet || (git commit -m "Update AI news for $(date +%Y-%m-%d) [run $(date +%H:%M)]" && git push)
